<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Email Verifier</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #667eea, #764ba2);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
      }

      .container {
        background: #fff;
        width: 100%;
        max-width: 520px;
        border-radius: 16px;
        padding: 40px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25);
      }

      .hide {
        display: none;
      }

      h1 {
        font-size: 24px;
        margin-bottom: 8px;
      }
      p {
        color: #666;
        font-size: 14px;
      }

      label {
        display: block;
        margin: 15px 0 8px;
        font-weight: 600;
      }

      input {
        width: 100%;
        padding: 12px;
        border: 2px solid #ddd;
        border-radius: 8px;
        font-size: 15px;
      }

      input:focus {
        outline: none;
        border-color: #667eea;
      }

      .btns {
        display: flex;
        gap: 10px;
        margin-top: 20px;
      }

      button {
        flex: 1;
        padding: 12px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-weight: 600;
      }

      .primary {
        background: #667eea;
        color: white;
      }

      .secondary {
        background: #eee;
      }

      .primary:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      .result {
        margin-top: 20px;
        padding: 15px;
        border-radius: 10px;
        display: none;
      }

      .success {
        background: #d4edda;
        color: #155724;
        border: 1px solid #28a745;
      }
      .error {
        background: #f8d7da;
        color: #721c24;
        border: 1px solid #dc3545;
      }
      .warning {
        background: #fff3cd;
        color: #856404;
        border: 1px solid #ffc107;
      }

      .show {
        display: block;
      }

      .email-box {
        margin-top: 10px;
        padding: 8px;
        background: #f5f5f5;
        border-radius: 6px;
        font-size: 13px;
        word-break: break-all;
      }

      .loading {
        margin-top: 15px;
        display: none;
        color: #667eea;
      }

      .spinner {
        width: 18px;
        height: 18px;
        border: 3px solid #ddd;
        border-top-color: #667eea;
        border-radius: 50%;
        display: inline-block;
        animation: spin 0.8s linear infinite;
        margin-right: 8px;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>

  <body>
    <!-- LOGIN -->
    <div class="container" id="loginBox">
      <h1>🔒 Login Required</h1>
      <p>Enter password to access email verifier</p>

      <label>Password</label>
      <input type="password" id="password" placeholder="Enter password" />

      <div class="btns">
        <button class="primary" onclick="login()">Login</button>
      </div>

      <div id="loginResult" class="result"></div>
    </div>

    <!-- APP -->
    <div class="container hide" id="appBox">
      <h1>✉️ Email Verifier</h1>
      <p>SMTP-based email validation (single check mode)</p>

      <label>Email</label>
      <input type="email" id="email" placeholder="name@company.com" />

      <div class="btns">
        <button class="primary" id="verifyBtn" onclick="verify()">
          Verify
        </button>
        <button class="secondary" onclick="clearAll()">Clear</button>
      </div>

      <div class="loading" id="loading">
        <span class="spinner"></span> Checking SMTP server...
      </div>

      <div id="result" class="result"></div>
    </div>

    <script>
      const loginBox = document.getElementById("loginBox");
      const appBox = document.getElementById("appBox");
      const result = document.getElementById("result");
      const loading = document.getElementById("loading");
      const verifyBtn = document.getElementById("verifyBtn");

      function setCookie(name, value) {
        document.cookie = name + "=" + value + "; path=/";
      }

      function hasAuth() {
        return document.cookie.includes("emailCheckerAuth=IamHuman");
      }

      if (hasAuth()) {
        loginBox.classList.add("hide");
        appBox.classList.remove("hide");
      }

      async function login() {
        const password = document.getElementById("password").value;

        const res = await fetch("/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ password }),
        });

        if (res.ok) {
          setCookie("emailCheckerAuth", "IamHuman");
          loginBox.classList.add("hide");
          appBox.classList.remove("hide");
        } else {
          showLoginError("Invalid password");
        }
      }

      function showLoginError(msg) {
        const el = document.getElementById("loginResult");
        el.className = "result error show";
        el.innerHTML = msg;
      }

      async function verify() {
        const email = document.getElementById("email").value;

        if (!email) return showResult("Enter email", "error");

        verifyBtn.disabled = true;
        loading.style.display = "block";
        result.className = "result";

        try {
          const res = await fetch("/verify", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email }),
          });

          const data = await res.json();

          loading.style.display = "none";
          render(data, email);
        } catch (e) {
          loading.style.display = "none";
          showResult("Network error", "error");
        }

        verifyBtn.disabled = false;
      }

      function render(data, email) {
        let type = "warning";
        let title = "UNKNOWN";
        let icon = "⚠";

        switch (data.status) {
          case "DELIVERABLE":
            type = "success";
            title = "VALID EMAIL";
            icon = "✓";
            break;

          case "UNDELIVERABLE":
            type = "error";
            title = "INVALID EMAIL";
            icon = "✗";
            break;

          case "TEMPORARY":
            type = "warning";
            title = "TEMPORARY ISSUE";
            icon = "⏳";
            break;

          case "RISK_CATCH_ALL":
            type = "warning";
            title = "CATCH-ALL DOMAIN";
            icon = "⚠";
            break;

          case "CONNECTION_FAILED":
            type = "warning";
            title = "CONNECTION FAILED";
            icon = "⚠";
            break;
        }

        result.className = `result show ${type}`;

        result.innerHTML = `
    <h3>${icon} ${title}</h3>
    <div class="email-box">${email}</div>
    ${data.reason ? `<p>${data.reason}</p>` : ""}
    ${data.confidence ? `<p>Confidence: ${data.confidence}</p>` : ""}
  `;
      }

      function showResult(msg, type) {
        result.className = `result show ${type}`;
        result.innerHTML = msg;
      }

      function clearAll() {
        document.getElementById("email").value = "";
        result.className = "result";
        loading.style.display = "none";
      }
    </script>
  </body>
</html>
